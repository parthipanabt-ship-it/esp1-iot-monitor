<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Guard | IoT Safety Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: #ffffff; transition: background-color 0.8s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .status-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen flex flex-col items-center">

    <div class="max-w-6xl mx-auto w-full flex flex-col md:flex-row justify-between items-center mb-12">
        <div class="flex items-center gap-5">
            <img src="logo.png" alt="Sentinel Logo" class="w-20 h-20 rounded-full border-2 border-blue-500/30 shadow-lg shadow-blue-500/10">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Sentinel <span class="text-blue-500">Guard</span></h1>
                <p class="text-slate-400 mt-1 font-light tracking-wide uppercase text-xs">Cloud IoT Safety Protocol • Active</p>
            </div>
        </div>
        <div id="connection-badge" class="mt-4 md:mt-0 px-5 py-2 rounded-full text-sm font-semibold bg-yellow-500/10 text-yellow-500 border border-yellow-500/20">
            ● Connecting to HiveMQ...
        </div>
    </div>

    <div class="max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        
        <div class="glass p-8 rounded-3xl">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Temperature</span>
            <h2 id="temp-val" class="text-6xl font-bold mt-4">--<span class="text-2xl text-slate-500 ml-1">°C</span></h2>
            <div class="mt-6 h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="temp-bar" class="h-full bg-gradient-to-r from-orange-400 to-red-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Humidity</span>
            <h2 id="hum-val" class="text-6xl font-bold mt-4">--<span class="text-2xl text-slate-500 ml-1">%</span></h2>
            <div class="mt-6 h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="hum-bar" class="h-full bg-gradient-to-r from-blue-400 to-cyan-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div id="gas-card" class="glass p-8 rounded-3xl">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Gas Level (PPM)</span>
            <h2 id="gas-val" class="text-6xl font-bold mt-4">---</h2>
            <p id="gas-status" class="mt-4 text-xs font-semibold text-emerald-400 tracking-wide uppercase">Air Quality: Stable</p>
        </div>

        <div id="flame-card" class="glass p-8 rounded-3xl transition-all duration-500">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Safety Scan</span>
            <h2 id="flame-text" class="text-2xl font-bold mt-6 text-slate-300">Scanning...</h2>
            <div id="flame-led" class="mt-4 w-3 h-3 rounded-full bg-slate-700"></div>
        </div>

    </div>

    <footer class="max-w-6xl mx-auto w-full mt-12 flex flex-col md:flex-row justify-between items-center text-slate-500 text-sm border-t border-white/5 pt-8">
        <div>Project: LPG Burst Prevention System</div>
        <div id="last-updated">Last sync: Waiting for data...</div>
    </footer>

    <script>
        // --- HIVEMQ CLOUD CONFIG ---
        const BROKER_HOST = "ba98ce8821cf4846974ee6004d153172.s1.eu.hivemq.cloud";
        const BROKER_PORT = 8884; 
        const MQTT_USER = "iot_user";
        const MQTT_PASS = "Pass1234567";
        const TOPIC = "home/sensors";
        const CLIENT_ID = "Sentinel_Web_" + Math.random().toString(16).substr(2, 8);

        const client = new Paho.MQTT.Client(BROKER_HOST, BROKER_PORT, CLIENT_ID);

        const onConnect = () => {
            document.getElementById('connection-badge').innerText = "● System Online";
            document.getElementById('connection-badge').className = "px-5 py-2 rounded-full text-sm font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            client.subscribe(TOPIC);
        };

        const onConnectionLost = () => {
            document.getElementById('connection-badge').innerText = "● Connection Lost";
            document.getElementById('connection-badge').className = "px-5 py-2 rounded-full text-sm font-semibold bg-red-500/10 text-red-500 border border-red-500/20";
            setTimeout(() => client.connect(options), 5000);
        };

        const onMessageArrived = (message) => {
            const data = JSON.parse(message.payloadString);
            const now = new Date().toLocaleTimeString();
            document.getElementById('last-updated').innerText = "Last sync: " + now;

            // Updates
            document.getElementById('temp-val').innerHTML = data.temp + '<span class="text-2xl text-slate-500 ml-1">°C</span>';
            document.getElementById('temp-bar').style.width = (data.temp * 2) + '%';
            document.getElementById('hum-val').innerHTML = data.hum + '<span class="text-2xl text-slate-500 ml-1">%</span>';
            document.getElementById('hum-bar').style.width = data.hum + '%';
            document.getElementById('gas-val').innerText = data.gas;

            // EMERGENCY LOGIC
            const isDanger = (data.flame == 1 || data.gas > 600);
            const fCard = document.getElementById('flame-card');
            const fText = document.getElementById('flame-text');
            const gStatus = document.getElementById('gas-status');

            if (isDanger) {
                document.body.style.backgroundColor = "#450a0a"; // Global Alert Red
                document.getElementById('connection-badge').className = "px-5 py-2 rounded-full text-sm font-semibold bg-red-600 text-white animate-pulse";
                document.getElementById('connection-badge').innerText = "⚠️ EMERGENCY ALERT";
            } else {
                document.body.style.backgroundColor = "#0b0f1a";
                document.getElementById('connection-badge').innerText = "● System Online";
            }

            // Flame Detail
            if(data.flame == 1) {
                fText.innerText = "FIRE DETECTED";
                fText.classList.add('text-red-500');
                fCard.classList.add('status-pulse', 'border-red-500/50');
            } else {
                fText.innerText = "Secure Area";
                fText.classList.remove('text-red-500');
                fCard.classList.remove('status-pulse', 'border-red-500/50');
            }

            // Gas Detail
            if(data.gas > 600) {
                gStatus.innerText = "LEAK DETECTED!";
                gStatus.className = "mt-4 text-xs font-bold text-red-500 animate-bounce";
            } else {
                gStatus.innerText = "Air Quality: Stable";
                gStatus.className = "mt-4 text-xs font-semibold text-emerald-400 tracking-wide uppercase";
            }
        };

        const options = { useSSL: true, userName: MQTT_USER, password: MQTT_PASS, onSuccess: onConnect, onFailure: (e) => console.log(e) };
        client.onMessageArrived = onMessageArrived;
        client.onConnectionLost = onConnectionLost;
        client.connect(options);
    </script>
</body>
</html>

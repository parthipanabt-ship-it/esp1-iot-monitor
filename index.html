
  
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Monitor | IoT Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: #ffffff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
        .status-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen flex flex-col justify-center">

    <div class="max-w-6xl mx-auto w-full flex flex-col md:flex-row justify-between items-center mb-12">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">Smart Station <span class="text-blue-500">Live</span></h1>
            <p class="text-slate-400 mt-1 font-light">Global Monitoring • ESP8266 & MQTT</p>
        </div>
        <div id="connection-badge" class="mt-4 md:mt-0 px-4 py-2 rounded-full text-sm font-semibold bg-yellow-500/10 text-yellow-500 border border-yellow-500/20">
            ● Connecting to HiveMQ...
        </div>
    </div>

    <div class="max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        
        <div class="glass p-8 rounded-3xl">
            <div class="flex justify-between items-start">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Temperature</span>
                <span class="text-orange-500 text-xl">🌡️</span>
            </div>
            <h2 id="temp-val" class="text-6xl font-bold mt-4">--<span class="text-2xl text-slate-500 ml-1">°C</span></h2>
            <div class="mt-6 h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="temp-bar" class="h-full bg-gradient-to-r from-orange-400 to-red-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <div class="flex justify-between items-start">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Humidity</span>
                <span class="text-blue-400 text-xl">💧</span>
            </div>
            <h2 id="hum-val" class="text-6xl font-bold mt-4">--<span class="text-2xl text-slate-500 ml-1">%</span></h2>
            <div class="mt-6 h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                <div id="hum-bar" class="h-full bg-gradient-to-r from-blue-400 to-cyan-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <div class="flex justify-between items-start">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Air Quality</span>
                <span class="text-emerald-400 text-xl">☁️</span>
            </div>
            <h2 id="gas-val" class="text-6xl font-bold mt-4">---</h2>
            <p id="gas-status" class="mt-4 text-xs font-semibold text-emerald-400 tracking-wide uppercase">Monitoring Gas Levels</p>
        </div>

        <div id="flame-card" class="glass p-8 rounded-3xl transition-all duration-500">
            <div class="flex justify-between items-start">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Safety Status</span>
                <span id="flame-emoji" class="text-xl">🛡️</span>
            </div>
            <h2 id="flame-text" class="text-2xl font-bold mt-6 text-slate-300 tracking-tight">System Ready</h2>
            <div id="flame-led" class="mt-4 w-3 h-3 rounded-full bg-slate-700"></div>
        </div>

    </div>

    <footer class="max-w-6xl mx-auto w-full mt-12 text-center text-slate-600 text-sm">
        Dashboard automatically refreshes every 5 seconds.
    </footer>

    <script>
        // --- YOUR HIVEMQ CONFIGURATION ---
        const BROKER_HOST = "ba98ce8821cf4846974ee6004d153172.s1.eu.hivemq.cloud";
        const BROKER_PORT = 8884; // WebSocket Port
        const MQTT_USER = "iot_user";
        const MQTT_PASS = "Pass1234567";
        const CLIENT_ID = "Web_Monitor_" + Math.floor(Math.random() * 1000);

        const client = new Paho.MQTT.Client(BROKER_HOST, BROKER_PORT, CLIENT_ID);

        const onConnect = () => {
            const badge = document.getElementById('connection-badge');
            badge.innerText = "● System Online";
            badge.className = "mt-4 md:mt-0 px-4 py-2 rounded-full text-sm font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            client.subscribe("home/sensors");
        };

        const onConnectionLost = (responseObject) => {
            const badge = document.getElementById('connection-badge');
            badge.innerText = "● Connection Lost";
            badge.className = "mt-4 md:mt-0 px-4 py-2 rounded-full text-sm font-semibold bg-red-500/10 text-red-500 border border-red-500/20";
            setTimeout(() => client.connect(options), 5000);
        };

        const onMessageArrived = (message) => {
            const data = JSON.parse(message.payloadString);
            
            // Update Stats
            document.getElementById('temp-val').innerHTML = data.temp + '<span class="text-2xl text-slate-500 ml-1">°C</span>';
            document.getElementById('temp-bar').style.width = (data.temp / 50 * 100) + '%'; // Scaled to 50°C max
            
            document.getElementById('hum-val').innerHTML = data.hum + '<span class="text-2xl text-slate-500 ml-1">%</span>';
            document.getElementById('hum-bar').style.width = data.hum + '%';
            
            document.getElementById('gas-val').innerText = data.gas;

            // FLAME LOGIC: 1 = Flame Detected, 0 = Safe
            const fCard = document.getElementById('flame-card');
            const fText = document.getElementById('flame-text');
            const fLED = document.getElementById('flame-led');
            const fEmoji = document.getElementById('flame-emoji');

            if(data.flame == 1) { 
                fText.innerText = "FIRE DETECTED";
                fText.className = "text-2xl font-bold mt-6 text-red-500";
                fCard.classList.add('status-pulse', 'border-red-500/50', 'bg-red-500/10');
                fLED.className = "mt-4 w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
                fEmoji.innerText = "🔥";
            } else {
                fText.innerText = "Secure Area";
                fText.className = "text-2xl font-bold mt-6 text-emerald-400";
                fCard.classList.remove('status-pulse', 'border-red-500/50', 'bg-red-500/10');
                fLED.className = "mt-4 w-3 h-3 rounded-full bg-emerald-500 shadow-none";
                fEmoji.innerText = "🛡️";
            }
        };

        const options = {
            useSSL: true,
            userName: MQTT_USER,
            password: MQTT_PASS,
            onSuccess: onConnect,
            onFailure: (e) => console.log("Failed to connect", e)
        };

        client.onMessageArrived = onMessageArrived;
        client.onConnectionLost = onConnectionLost;
        client.connect(options);

    </script>
</body>
</html>
